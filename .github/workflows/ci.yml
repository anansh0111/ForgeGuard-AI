name: CI — ForgeGuard AI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install system dependency (libgomp for LightGBM)
        run: sudo apt-get install -y --no-install-recommends libgomp1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml -v
        env:
          DATABASE_URL: "sqlite:///:memory:"
          MODEL_PATH: "/nonexistent/model.pkl"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # BUG 5 FIX: cache package.json not package-lock.json (no lockfile in repo)
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        # BUG 5 FIX: use npm install, not npm ci (no package-lock.json)
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: "http://localhost:8000"

  docker-compose-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet
